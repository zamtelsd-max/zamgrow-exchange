version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: zamgrow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zamgrow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zamgrow_secret_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: zamgrow-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zamgrow-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:zamgrow_secret_2024@postgres:5432/zamgrow_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: zamgrow-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: production
      PRICING_ENGINE_URL: http://pricing:8000
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python Pricing Engine
  pricing:
    build:
      context: ./pricing-engine
      dockerfile: Dockerfile
    container_name: zamgrow-pricing
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:zamgrow_secret_2024@postgres:5432/zamgrow_db
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React PWA
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zamgrow-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "3000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: zamgrow-network
