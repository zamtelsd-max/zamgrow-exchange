name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # Frontend CI
  frontend-ci:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # Backend CI
  backend-ci:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Lint
        run: npm run lint || true

  # Pricing Engine CI
  pricing-ci:
    name: Pricing Engine Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pricing-engine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: pip install ruff && ruff check . || true

      - name: Test FastAPI app imports
        run: python -c "from main import app; from pricing import calculate_price_suggestion; print('✓ Pricing engine imports OK')"

  # Docker build check
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci, pricing-ci]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: zamgrow-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: zamgrow-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build pricing engine image
        uses: docker/build-push-action@v5
        with:
          context: ./pricing-engine
          push: false
          tags: zamgrow-pricing:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Security scan
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]

    steps:
      - uses: actions/checkout@v4

      - name: Audit frontend dependencies
        working-directory: ./frontend
        run: npm install && npm audit --audit-level=high || true

      - name: Audit backend dependencies
        working-directory: ./backend
        run: npm install && npm audit --audit-level=high || true
